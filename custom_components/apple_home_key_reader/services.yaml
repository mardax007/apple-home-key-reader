run_known_shell_command:
  name: Run known shell command
  description: Run the configured on_known_shell_command on the Raspberry Pi. When called with a response variable, returns ok/command/returncode/stdout/stderr.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry ID. If omitted, first configured entry is used.
      selector:
        text:

add_known_uid:
  name: Add known NFC UID
  description: Add a known NFC UID with optional name (use list_unknown_uids response to pick IDs from the new list).
  fields:
    uid:
      required: true
      name: UID
      selector:
        text:
    name:
      required: false
      name: Name
      selector:
        text:
    entry_id:
      required: false
      name: Entry ID
      selector:
        text:
remove_known_uid:
  name: Remove known NFC UID
  description: Remove a known NFC UID (use list_known_uids response to pick IDs).
  fields:
    uid:
      required: true
      name: UID
      selector:
        text:
    entry_id:
      required: false
      name: Entry ID
      selector:
        text:

add_unknown_uid:
  name: Add unknown NFC UID
  description: Add an NFC UID to the unknown list.
  fields:
    uid:
      required: true
      name: UID
      selector:
        text:
    entry_id:
      required: false
      name: Entry ID
      selector:
        text:

remove_unknown_uid:
  name: Remove unknown NFC UID
  description: Remove an NFC UID from the unknown list (use list_unknown_uids response to pick IDs).
  fields:
    uid:
      required: true
      name: UID
      selector:
        text:
    entry_id:
      required: false
      name: Entry ID
      selector:
        text:

run_shell_command:
  name: Run shell command
  description: Run a shell command on the Raspberry Pi. When called with a response variable, returns ok/command/returncode/stdout/stderr.
  fields:
    command:
      required: true
      name: Command
      description: Command as string or list, e.g. "echo hello" or ["echo", "hello"]
      selector:
        text:
    entry_id:
      required: false
      name: Entry ID
      selector:
        text:

list_known_uids:
  name: List known NFC UIDs
  description: Return the current known UID list (with optional names) for dropdown-like selection workflows.
  fields:
    entry_id:
      required: false
      name: Entry ID
      selector:
        text:

list_unknown_uids:
  name: List unknown NFC UIDs
  description: Return the current new/unknown UID list for dropdown-like selection workflows.
  fields:
    entry_id:
      required: false
      name: Entry ID
      selector:
        text:
